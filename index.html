<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Bingo Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-animation">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <div id="login-overlay" class="overlay-modal">
        <div class="login-popup-box">
            <h2>🔮 LOGIN LUCKY BINGO 🔮</h2>
            <p>Silakan masukkan User ID / Akun Anda untuk memulai permainan.</p>
            
            <div class="popup-input-wrapper">
                <input type="text" id="user-id" placeholder="MASUKKAN USER ID..." oninput="validateInput()">
                <div class="error-msg" id="error-message" style="color: #f87171; font-size: 12px; margin-top: 6px; display: none; font-weight: bold;">ID ini sudah mengklaim hadiah hari ini!</div>
            </div>
            
            <button id="login-btn" class="btn-popup-submit" onclick="submitUserId()" style="background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); cursor: pointer; width: 100%; padding: 14px; border-radius: 50px; border: none; font-size: 15px; font-weight: bold; color: #fff;">MASUK GAME</button>
        </div>
    </div>
            

    <div class="game-container" id="main-game-container">
        <h1 id="welcome-title">🔮 LUCKY BINGO 🔮</h1>
        
        <div class="game-center-area">
            <div class="bingo-machine-box">
                <div class="canvas-circle">
                    <div class="html-ball" id="ball0">?</div>
                    <div class="html-ball" id="ball1">?</div>
                    <div class="html-ball" id="ball2">?</div>
                    <div class="html-ball" id="ball3">?</div>
                    <div class="html-ball" id="ball4">?</div>
                    <div class="html-ball" id="ball5">?</div>
                </div>
                <div class="tube-outlet"></div>
            </div>
            <button id="spin-btn" class="btn-action" onclick="startBingo()">Kocok Bola!</button>
        </div>

        <div class="result-container" id="result-container">
            <h3>Bola Keluar:</h3>
            <div class="winning-ball-display" id="winner-ball">?</div>
            <h2 id="prize-text">Membuka Hadiah...</h2>
            <button id="claim-btn" class="btn-action animate-pulse" onclick="redirectToClaim()">CLAIM SEKARANG!</button>
        </div>

        <div class="live-results-panel">
            <div class="live-title">Live Claim Terkini</div>
            <div class="marquee-box">
                <div class="marquee-content" id="marquee-text"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
